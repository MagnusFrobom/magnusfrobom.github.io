                <div class="form w-form">
                    <form id="email-form" name="email-form" data-name="Email Form" method="get"><label for="name"
                            class="field">Name:</label><input type="text" class="input w-input" maxlength="256"
                            name="name" data-name="Name" placeholder="Enter your name" id="name" /><label for="email"

                            type="email" class="input w-input" maxlength="256" name="Subject" data-name="Subject"
                            placeholder="Enter your subject" id="Subject" required="" /><label for="field"
                            class="field">Message:</label><textarea id="field" name="field"
                            placeholder="Enter your message" maxlength="5000" data-name="field"
                            class="input textarea w-input"></textarea><input type="submit" value="Send Message"
                            data-wait="Please wait..." class="button contact w-button" /></form>
                    <div class="success w-form-done">
                        <p>Thank you! Your submission has been received!</p>
                    </div>
                    <div class="w-form-fail">
                        <p>Oops! Something went wrong while submitting the form</p>
                    </div>
